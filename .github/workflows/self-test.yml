name: self-test

# Run the action against its own fixtures: clean fixtures must pass, dirty
# fixtures (skipped / focused tests) must fail.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  clean-passes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [typescript, python]
    steps:
      - uses: actions/checkout@v4
      - name: clean fixture should pass
        uses: ./
        with:
          language: ${{ matrix.lang }}
          working-directory: tests/fixtures/${{ matrix.lang }}-clean

  dirty-fails:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [typescript, python]
    steps:
      - uses: actions/checkout@v4
      - name: dirty fixture should fail
        id: gate
        continue-on-error: true
        uses: ./
        with:
          language: ${{ matrix.lang }}
          working-directory: tests/fixtures/${{ matrix.lang }}-dirty
      - name: assert the gate failed
        run: |
          if [ "${{ steps.gate.outcome }}" = "success" ]; then
            echo "❌ expected the gate to FAIL on the dirty fixture"
            exit 1
          fi
          echo "✅ dirty fixture correctly failed the gate"
